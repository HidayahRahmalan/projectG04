<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Multiple Resume Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f2f2f2;
        }
        .resume-container {
            margin-bottom: 40px;
            background: #fff;
            padding: 20px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        iframe {
            width: 100%;
            height: 500px;
            border: none;
        }
        h2 {
            margin-bottom: 10px;
            color: #007acc;
        }
        .download-btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background-color: #007acc;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
        .download-btn:hover {
            background-color: #005e99;
        }
    </style>
</head>
<body>

    <h1>Resume Viewer</h1>

    <div class="resume-container">
        <h2>MUHAMMAD NUR SYAHMIE AMIRULLAH BIN NOR AZAAR KAMAL</h2>
        <iframe src="syahmie_resume.pdf"></iframe>
        <a href="syahmie_resume.pdf" class="download-btn" download>Download Resume 1</a>
    </div>

    <div class="resume-container">
        <h2>NOOR EZAH BINTI ABD AZIZ FAUZI</h2>
        <iframe src="ezah_resume.pdf"></iframe>
        <a href="ezah_resume.pdf" class="download-btn" download>Download Resume 2</a>
    </div>

    <div class="resume-container">
        <h2>RWONG YI XUAN</h2>
        <iframe src="wong_resume.pdf"></iframe>
        <a href="wong_resume.pdf" class="download-btn" download>Download Resume 3</a>
    </div>

    <div class="resume-container">
        <h2>AMIR ZULHAFIZ BIN MUHAMMAD</h2>
        <iframe src="amir_resume.pdf"></iframe>
        <a href="amir_resume.pdf" class="download-btn" download>Download Resume 4</a>
    </div>

</body>
</html>
